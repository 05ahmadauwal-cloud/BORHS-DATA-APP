services:
  # ─── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: borhs-data
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://borhs-data-app.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: BCRYPT_ROUNDS
        value: 12
      - key: MONGODB_MAX_POOL_SIZE
        value: 50
      - key: MONGODB_MIN_POOL_SIZE
        value: 5
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: MONNIFY_API_KEY
        sync: false
      - key: MONNIFY_SECRET_KEY
        sync: false
      - key: MONNIFY_CONTRACT_CODE
        sync: false
      - key: MONNIFY_BASE_URL
        value: https://api.monnify.com
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_PUBLIC_KEY
        sync: false
      - key: FLUTTERWAVE_WEBHOOK_SECRET
        sync: false
      - key: VTPASS_BASE_URL
        value: https://api-service.vtpass.com/api
      - key: VTPASS_SANDBOX_URL
        value: https://sandbox.vtpass.com/api
      - key: VTPASS_API_KEY
        sync: false
      - key: VTPASS_PUBLIC_KEY
        sync: false
      - key: VTPASS_SECRET_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: noreply@borhsdata.com
      - key: EMAIL_FROM_NAME
        value: BORHS Data
      - key: APP_NAME
        value: BORHS Data
      - key: APP_URL
        value: https://borhs-data-app.onrender.com
      - key: SUPPORT_EMAIL
        value: support@borhsdata.com
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 600
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: REFERRAL_LEVEL1_PERCENT
        value: 5
      - key: REFERRAL_LEVEL2_PERCENT
        value: 2
      - key: REFERRAL_LEVEL3_PERCENT
        value: 1
      - key: UPLOAD_PATH
        value: uploads/

  # ─── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: borhs-data-app
    env: static
    rootDir: frontend
    buildCommand: npm install; npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://borhs-data.onrender.com/api/v1
